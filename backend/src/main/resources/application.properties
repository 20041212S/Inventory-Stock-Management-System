# Database Configuration - Uses environment variables for Railway
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/inventory_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Server Configuration - Railway provides PORT environment variable
server.port=${PORT:8080}

# CORS Configuration - handled by CorsConfig.java
# Will be updated to allow Railway frontend domain

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application Name
spring.application.name=inventory-stock-management
