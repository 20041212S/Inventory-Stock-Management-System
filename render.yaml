services:
  - type: web
    name: inventory-stock-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard from Neon
      - key: DB_USER
        sync: false   # Set manually in Render dashboard from Neon
      - key: DB_PASSWORD
        sync: false   # Set manually in Render dashboard from Neon
      - key: PORT
        value: 8080
