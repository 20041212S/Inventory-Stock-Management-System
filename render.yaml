services:
  - type: web
    name: inventory-stock-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_USER
        fromDatabase:
          name: inventory-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: inventory-db
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: PORT
        value: 8080

databases:
  - name: inventory-db
    databaseName: inventory_db
    user: inventory_user
    plan: free
